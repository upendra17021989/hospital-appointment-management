# ============================================
# Hospital Management System - Application Config
# ============================================

spring.application.name=hospital-management

# ============================================
# SUPABASE / PostgreSQL Connection
# Replace with your actual Supabase credentials
# ============================================
spring.datasource.url=jdbc:postgresql://aws-1-ap-south-1.pooler.supabase.com:6543/postgres?prepareThreshold=0
spring.datasource.username=postgres.glzfifztyeuwcbvsbufn
spring.datasource.password=MtiFj2bZYMHMPSA2
spring.datasource.driver-class-name=org.postgresql.Driver

# Connection Pool (HikariCP)
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5

# ============================================
# JPA / Hibernate
# ============================================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ============================================
# Server
# ============================================
server.port=8080
server.servlet.context-path=/api

# ============================================
# CORS
# ============================================
app.cors.allowed-origins=http://localhost:3000,http://localhost:5173

app.jwt.secret=buGdTD1uDQHcfGMEVQ7kBrXnSyQ00IjML1THiYMTlvaIcdr7jlc3TlH4xZkxjwSX6e2IT9uJAe/aCbPJfyWXiA==
app.jwt.expiration-ms=86400000

# ============================================
# Springdoc / Swagger UI
# ============================================
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method

# ============================================
# Logging
# ============================================
logging.level.com.hospital=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN

